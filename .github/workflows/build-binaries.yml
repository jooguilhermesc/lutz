name: Build Installers

# Triggered on every release tag or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v0.3.0)"
        required: true
        default: "v0.3.0"

permissions:
  contents: write

# ── Shared setup steps ────────────────────────────────────────────────────────
# Both jobs follow the same pattern:
#   1. Build React frontend (npm ci + npm run build)
#   2. Stage web/dist → lutz/web/
#   3. pip install pyinstaller + the package itself
#   4. pyinstaller lutz.spec  →  dist/lutz[.exe]
#   5. Wrap in platform installer
#   6. Upload installer to the GitHub release

jobs:

  # ── Windows: Inno Setup installer (.exe wizard) ─────────────────────────────
  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build React frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Stage web assets
        shell: bash
        run: |
          rm -rf lutz/web
          cp -r web/dist lutz/web

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install .

      - name: Build main CLI binary
        run: pyinstaller lutz.spec

      - name: Build silent GUI launcher
        run: |
          pyinstaller --onefile --windowed --name lutz-ui `
            installer/windows/launcher.py

      - name: Copy launcher next to CLI binary
        shell: pwsh
        run: Copy-Item dist\lutz-ui.exe installer\windows\lutz-ui.exe

      # Inno Setup is pre-installed on windows-latest runners
      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\iscc.exe" /DAppVersion=${{ github.event.inputs.tag || github.ref_name }} installer\windows\lutz.iss

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/installer/lutz-setup-windows-x64.exe

  # ── Linux: .deb (Ubuntu/Debian) + AppImage ──────────────────────────────────
  linux:
    name: Linux packages
    runs-on: ubuntu-22.04    # 22.04 for glibc 2.35 — compatible with Ubuntu 22/24 and Debian 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            libgl1 \
            libglib2.0-0 \
            fuse \
            libfuse2

      - name: Build React frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Stage web assets
        run: |
          rm -rf lutz/web
          cp -r web/dist lutz/web

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install .

      - name: Build binary
        run: pyinstaller lutz.spec

      # ── .deb package ──────────────────────────────────────────────────────
      - name: Build .deb
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"    # strip leading 'v'
          bash installer/linux/build-deb.sh "${VERSION}"

      # ── AppImage ──────────────────────────────────────────────────────────
      - name: Build AppImage
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"

          # Download appimagetool
          wget -qO appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          # Build AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/lutz AppDir/usr/bin/lutz
          chmod 755 AppDir/usr/bin/lutz

          cp installer/linux/lutz.desktop AppDir/lutz.desktop
          cp installer/linux/lutz.desktop AppDir/usr/share/applications/lutz.desktop

          if [ -f web/public/lutz.png ]; then
            cp web/public/lutz.png AppDir/lutz.png
            cp web/public/lutz.png AppDir/usr/share/icons/hicolor/256x256/apps/lutz.png
          fi

          # AppRun entry point
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "$APPDIR/usr/bin/lutz" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Build
          ARCH=x86_64 ./appimagetool AppDir "dist/lutz-${VERSION}-x86_64.AppImage"

      - name: Upload Linux packages
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/lutz-research_*_amd64.deb
            dist/lutz-*-x86_64.AppImage
