name: Build Binaries

# Triggered on every release tag or manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v0.5.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:

  # ── Windows: portable .exe via PyInstaller ───────────────────────────────────
  windows:
    name: Windows binary
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build React frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Stage web assets
        shell: bash
        run: |
          rm -rf lutz/web
          cp -r web/dist lutz/web

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install .
          pip install torch --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Build CLI binary
        run: pyinstaller lutz.spec

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lutz-windows-x64
          path: dist/lutz.exe
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/lutz.exe
