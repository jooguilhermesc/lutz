name: Build Installers

# Triggered on every release tag or manually.
# Linux distribution is handled via Docker and uv (see issue #linux-packaging).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v0.3.0)"
        required: true
        default: "v0.3.0"

permissions:
  contents: write

jobs:

  # ── Windows: Inno Setup installer (.exe wizard) ─────────────────────────────
  windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build React frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Stage web assets
        shell: bash
        run: |
          rm -rf lutz/web
          cp -r web/dist lutz/web

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install .
          pip install torch --index-url https://download.pytorch.org/whl/cpu --force-reinstall

      - name: Build main CLI binary
        run: pyinstaller lutz.spec

      - name: Build silent GUI launcher
        run: |
          pyinstaller --onefile --windowed --name lutz-ui `
            installer/windows/launcher.py

      - name: Copy launcher next to CLI binary
        shell: pwsh
        run: Copy-Item dist\lutz-ui.exe installer\windows\lutz-ui.exe

      # Inno Setup is pre-installed on windows-latest runners
      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\iscc.exe" /DAppVersion=${{ github.event.inputs.tag || github.ref_name }} installer\windows\lutz.iss

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/installer/lutz-setup-windows-x64.exe
